# ======================================================
# Docker Compose — E-Commerce Analytics Platform
# ======================================================
# Chạy: docker compose up --build
# Dừng: docker compose down
# ======================================================

services:
  # ---- Backend API (FastAPI) ----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ecom-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount thư mục data để backend đọc Parquet files
      - ./data:/app/data:ro
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - app-network

  # ---- Frontend Dashboard (Next.js) ----
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: ecom-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # ---- Prometheus (Metrics Scraper) ----
  prometheus:
    image: prom/prometheus:latest
    container_name: ecom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # ---- Grafana (Dashboard) ----
  grafana:
    image: grafana/grafana:latest
    container_name: ecom-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
